appId: com.gamehub.launcher
productName: Charles24_Launcher
copyright: Copyright © 2024

directories:
  output: dist
  buildResources: ../../public

asar: false

files:
  - out/**/*
  - package.json
  - node_modules/**/*
  - node_modules/.pnpm/**/*
  - ../../node_modules/**/*
  - ../../node_modules/.pnpm/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  certificateFile: null
  icon: logo.ico
  executableName: Charles24_Launcher
  artifactName: Charles24_Launcher.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  installerIcon: logo.ico
  uninstallerIcon: logo.ico
  installerHeaderIcon: logo.ico

mac:
  target:
    - dmg
  artifactName: GameHub-${version}.dmg

linux:
  target:
    - AppImage
  artifactName: GameHub-${version}.AppImage

publish:
  - provider: generic
    url: https://gamehubapi-production-1690.up.railway.app/launcher/updates/win32/
