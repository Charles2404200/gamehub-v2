appId: com.gamehub.launcher
productName: GameHub
copyright: Copyright © 2024

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - package.json
  - node_modules/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  certificateFile: null
  artifactName: GameHub-Setup-${version}.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

mac:
  target:
    - dmg
  artifactName: GameHub-${version}.dmg

linux:
  target:
    - AppImage
  artifactName: GameHub-${version}.AppImage

publish:
  - provider: generic
    url: https://pub-a4652a07eb284b5295b7e710ff59a071.r2.dev/launcher-updates/
